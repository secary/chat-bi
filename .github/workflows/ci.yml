name: ChatBI CI

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: chatbi-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0

      - name: Install dependencies
        run: |
          PYTHON=$([ -f .venv/bin/python ] && echo ".venv/bin/python" || echo "python")
          $PYTHON -m pip install --upgrade pip
          $PYTHON -m pip install -r requirements.txt

      - name: Lint
        run: |
          ruff check backend/ scripts/ tests/
          black --check backend/ scripts/ tests/

      - name: Run Python tests
        env:
          PYTHONPATH: .
          CHATBI_AUTH_ENABLED: "false"
          CHATBI_MEMORY_DISABLED: "1"
          CHATBI_VISION_DISABLED: "1"
          CHATBI_PDF_SUMMARY_DISABLED: "1"
        run: python scripts/run_tests.py all -- -q

  frontend-tests:
    name: Frontend lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
