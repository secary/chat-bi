name: chatbi-dev

services:
  demo-mysql:
    image: mysql:8.0
    container_name: chatbi-dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: chatbi_demo
      MYSQL_USER: demo_user
      MYSQL_PASSWORD: demo_pass
      TZ: Asia/Shanghai
    ports:
      - "3308:3306"
    volumes:
      - ./database/mysql-data-dev:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chatbi-dev-backend
    restart: unless-stopped
    env_file:
      - path: .env.dev
        required: false
    environment:
      CHATBI_DB_HOST: demo-mysql
      CHATBI_DB_PORT: 3306
      CHATBI_APP_DB_HOST: demo-mysql
      CHATBI_APP_DB_PORT: 3306
      CHATBI_ADMIN_DB_HOST: demo-mysql
      CHATBI_ADMIN_DB_PORT: 3306
      CHATBI_LOG_DB_HOST: demo-mysql
      CHATBI_LOG_DB_PORT: 3306
      CHATBI_MYSQL_CMD: mysql
      WATCHFILES_FORCE_POLLING: "true"
      # 开发默认关闭登录；设为 1/true 可启用与生产一致的 JWT 流程
      CHATBI_AUTH_ENABLED: "false"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app/backend
      - ./skills:/app/skills
    command:
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/backend
      - --reload-dir
      - /app/skills
    depends_on:
      - demo-mysql

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: chatbi-dev-frontend
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: http://backend:8000
      # 与后端一致；设为 true 时需同步开启 backend CHATBI_AUTH_ENABLED
      VITE_AUTH_ENABLED: "false"
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend-node-modules:
