name: chatbi-prod

services:
  demo-mysql:
    image: mysql:8.0
    container_name: chatbi-prod-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: chatbi_demo
      MYSQL_USER: demo_user
      MYSQL_PASSWORD: demo_pass
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./database/mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chatbi-prod-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      CHATBI_DB_HOST: demo-mysql
      CHATBI_DB_PORT: 3306
      CHATBI_LOG_DB_HOST: demo-mysql
      CHATBI_LOG_DB_PORT: 3306
      CHATBI_LOG_DB_NAME: chatbi_local_logs
      CHATBI_MYSQL_CMD: mysql
    ports:
      - "8000:8000"
    depends_on:
      - demo-mysql

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin /api (see frontend/nginx.conf). Not taken from root .env to avoid
        # stale FRONTEND_API_BASE_URL=http://localhost:8000 breaking the prod bundle.
        VITE_API_BASE_URL: /api
    container_name: chatbi-prod-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
