<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 38px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #233238; }
      .subtitle { font: 400 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #5a6770; }
      .caption { font: 700 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #4e90cf; letter-spacing: 1px; }
      .section { font: 700 21px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #233238; }
      .label { font: 500 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #34434b; }
      .small { font: 400 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #53636b; }
      .tiny { font: 400 13px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #607079; }
      .mini { font: 400 12px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #607079; }
      .chip-text { font: 500 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #33444c; }
      .white { font: 700 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #fff; }
      .blue-title { font: 700 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #1b2e82; }
      .axis { font: 700 17px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #169ba0; writing-mode: tb; letter-spacing: 3px; }
      .value { font: 700 26px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #e9271b; }
      .panel { fill: #ffffff; stroke: #d8e2e6; stroke-width: 1.5; }
      .soft-blue { fill: #eaf6fb; stroke: #afddec; }
      .soft-mint { fill: #eef9f6; stroke: #a6dcd4; }
      .soft-gold { fill: #fff6df; stroke: #ebca73; }
      .soft-pink { fill: #fdeeee; stroke: #edc7c4; }
      .soft-gray { fill: #f6f8f8; stroke: #d8e2e6; }
      .dash { stroke: #c6d2d7; stroke-width: 1; stroke-dasharray: 6 7; }
      .arrow { stroke: #49b5bb; stroke-width: 3; fill: none; }
      .blue-line { stroke: #2752d9; stroke-width: 2.2; fill: none; }
      .gold-line { stroke: #efb640; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrow-teal" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M2,2 L11,6.5 L2,11 Z" fill="#49b5bb"/>
    </marker>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2752d9"/>
    </marker>
    <marker id="arrow-gold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#efb640"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>

  <!-- Subtle Headless BI background rhythm -->
