    <path d="M1600 205 C1478 296 1448 398 1600 530"/>
    <path d="M420 855 L455 820 L490 855 L525 820 L560 855 L595 820 L630 855 L665 820 L700 855 L735 820 L770 855 L805 820 L840 855 L875 820 L910 855 L945 820 L980 855 L1015 820 L1050 855 L1085 820 L1120 855 L1155 820 L1190 855"/>
